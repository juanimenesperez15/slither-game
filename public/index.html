<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>El Gusanito de Romano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#080816;overflow:hidden;font-family:'Outfit','Space Grotesk',sans-serif;color:#fff;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
    canvas#game{display:block}
    #menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse at center,rgba(20,20,50,.95),rgba(8,8,22,.98));backdrop-filter:blur(12px);overflow-y:auto}
    #menu.hidden{display:none}
    .menu-box{text-align:center;padding:30px 36px;border-radius:24px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);box-shadow:0 20px 60px rgba(0,0,0,.4);max-width:92vw;margin:16px 0}
    .menu-box h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,6vw,42px);font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#6EE7B7,#3B82F6,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
    .menu-box .subtitle{color:rgba(255,255,255,.3);margin-bottom:16px;font-size:12px;letter-spacing:2px;text-transform:uppercase}
    #nameInput{display:block;width:260px;max-width:80vw;margin:0 auto 12px;padding:11px 16px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;border:2px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(255,255,255,.05);color:#fff;text-align:center;outline:none}
    #nameInput:focus{border-color:rgba(110,231,183,.5)}
    #nameInput::placeholder{color:rgba(255,255,255,.2)}
    .section-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3);margin-bottom:8px;margin-top:12px}
    #colorEditor{display:flex;justify-content:center;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    .color-pick{width:36px;height:36px;border:none;border-radius:10px;cursor:pointer;padding:0;background:none;-webkit-appearance:none}
    .color-pick::-webkit-color-swatch-wrapper{padding:0}
    .color-pick::-webkit-color-swatch{border:2px solid rgba(255,255,255,.2);border-radius:8px}
    .color-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
    #snakePreview{margin:0 auto 14px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
    .play-btn{display:block;width:260px;max-width:80vw;margin:8px auto 0;padding:13px;font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;border:none;border-radius:14px;background:linear-gradient(135deg,#6EE7B7,#3B82F6);color:#080816;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .play-btn:active{transform:scale(.98)}
    .controls-hint{margin-top:12px;color:rgba(255,255,255,.2);font-size:10px;line-height:1.8}
    .ranking-section{margin-top:14px;text-align:left}
    .ranking-section h4{font-family:'Space Grotesk',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3);margin-bottom:4px;text-align:center}
    .ranking-entry{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:rgba(255,255,255,.4);border-bottom:1px solid rgba(255,255,255,.03)}
    .ranking-entry:nth-child(2){color:#F59E0B;font-weight:700}
    .ranking-entry:nth-child(3){color:#C0C0C0;font-weight:600}
    .ranking-entry:nth-child(4){color:#CD7F32;font-weight:600}
    .ranking-name{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #deathScreen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:90;background:rgba(8,8,22,.88);backdrop-filter:blur(8px);overflow-y:auto}
    #deathScreen.show{display:flex}
    .death-box{text-align:center;padding:28px 36px;border-radius:24px;background:rgba(255,255,255,.03);border:1px solid rgba(239,68,68,.2);box-shadow:0 20px 60px rgba(0,0,0,.4);max-width:92vw;margin:16px 0}
    .death-box h2{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:800;color:#EF4444;margin-bottom:4px}
    .death-box p{color:rgba(255,255,255,.4);margin-bottom:8px;font-size:13px}
    #deathScore{font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:800;background:linear-gradient(135deg,#6EE7B7,#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    #hud{position:fixed;top:12px;left:12px;z-index:50;pointer-events:none}
    #score{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.85);text-shadow:0 2px 10px rgba(0,0,0,.6)}
    #effectsBar{margin-top:4px}
    .effect-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;margin-right:4px;color:#080816}
    #leaderboard{position:fixed;top:12px;right:12px;z-index:50;pointer-events:none;background:rgba(0,0,0,.3);border-radius:12px;padding:10px 14px;min-width:140px;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.05)}
    #leaderboard h3{font-family:'Space Grotesk',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.25);margin-bottom:6px}
    .lb-entry{display:flex;justify-content:space-between;font-size:11px;padding:1px 0;color:rgba(255,255,255,.5)}
    .lb-entry.you{color:#6EE7B7;font-weight:700}
    .lb-name{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #minimap{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.3)}
    #boostBar{position:fixed;bottom:4px;left:50%;transform:translateX(-50%);z-index:49;pointer-events:none;width:130px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
    #boostFill{height:100%;background:linear-gradient(90deg,#F59E0B,#EF4444);border-radius:2px;width:100%}
    #joystickArea{display:none;position:fixed;bottom:16px;left:12px;z-index:60;width:100px;height:100px}
    #joystickBase{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1)}
    #joystickThumb{position:absolute;width:36px;height:36px;border-radius:50%;background:rgba(110,231,183,.25);border:1.5px solid rgba(110,231,183,.4);top:50%;left:50%;transform:translate(-50%,-50%)}
    #boostBtn{display:none;position:fixed;bottom:28px;right:12px;z-index:61;width:56px;height:56px;border-radius:50%;background:rgba(245,158,11,.15);border:2px solid rgba(245,158,11,.35);color:rgba(255,255,255,.8);font-size:24px;cursor:pointer;-webkit-tap-highlight-color:transparent;align-items:center;justify-content:center}
    #boostBtn.active{background:rgba(245,158,11,.45);border-color:rgba(245,158,11,.7);transform:scale(1.08)}
    #pwToast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:80;pointer-events:none;font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;opacity:0;transition:opacity .3s,transform .3s}
    #pwToast.show{opacity:1;transform:translate(-50%,-60%)}
    @media(max-width:700px){.menu-box{padding:24px 20px}#leaderboard{padding:6px 10px;min-width:110px}.lb-entry{font-size:10px}.lb-name{max-width:60px}#minimap{width:80px!important;height:80px!important;bottom:8px!important}#boostBar{display:none!important}#score{font-size:15px}}
    @media(hover:hover) and (pointer:fine){#game{cursor:none}}
  </style>
</head>
<body>
<div id="menu">
  <div class="menu-box">
    <h1>El Gusanito de Romano</h1>
    <div class="subtitle">multijugador online</div>
    <input type="text" id="nameInput" placeholder="Tu nombre..." maxlength="15" autofocus value="Romano">
    <div class="section-label">Tus colores</div>
    <div id="colorEditor"></div>
    <canvas id="snakePreview" width="240" height="50"></canvas>
    <button class="play-btn" id="playBtn">JUGAR</button>
    <div class="controls-hint" id="controlsHint">Mouse = direccion &middot; Click / Espacio = turbo<br>Recoge orbes de poder en el mapa</div>
    <div id="menuRanking" class="ranking-section"></div>
  </div>
</div>
<div id="deathScreen">
  <div class="death-box">
    <h2>Moriste</h2>
    <p id="deathMsg"></p>
    <div id="deathScore">0</div>
    <p style="margin-top:3px;font-size:11px;color:rgba(255,255,255,.2)">de largo</p>
    <div id="deathRanking" class="ranking-section"></div>
    <br>
    <button class="play-btn" id="playBtn2">REINTENTAR</button>
  </div>
</div>
<div id="hud" class="hidden"><div id="score">Largo: 0</div><div id="effectsBar"></div></div>
<div id="leaderboard" class="hidden"><h3>Top Jugadores</h3><div id="lbList"></div></div>
<canvas id="minimap" class="hidden" width="120" height="120"></canvas>
<div id="boostBar" class="hidden"><div id="boostFill"></div></div>
<div id="joystickArea"><div id="joystickBase"></div><div id="joystickThumb"></div></div>
<button id="boostBtn">&#x1F680;</button>
<div id="pwToast"></div>
<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
'use strict';
var canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
var mmCvs=document.getElementById('minimap'),mmCtx=mmCvs.getContext('2d');
var W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize(); window.addEventListener('resize',resize);
var isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
var WORLD={w:2000,h:2000};

// ── Color editor ──
var myColors=['#4ECDC4','#45B7D1','#6EE7B7'];
var colorEditor=document.getElementById('colorEditor');
var previewCvs=document.getElementById('snakePreview');

function buildColorEditor(){
  colorEditor.innerHTML='';
  for(var i=0;i<myColors.length;i++){
    (function(idx){
      var inp=document.createElement('input');
      inp.type='color'; inp.value=myColors[idx]; inp.className='color-pick';
      inp.oninput=function(){myColors[idx]=inp.value;drawPreview();};
      colorEditor.appendChild(inp);
    })(i);
  }
  var addBtn=document.createElement('button');addBtn.className='color-btn';addBtn.textContent='+';
  addBtn.onclick=function(){if(myColors.length<6){myColors.push('#ffffff');buildColorEditor();drawPreview();}};
  colorEditor.appendChild(addBtn);
  if(myColors.length>1){
    var rmBtn=document.createElement('button');rmBtn.className='color-btn';rmBtn.textContent='-';
    rmBtn.onclick=function(){myColors.pop();buildColorEditor();drawPreview();};
    colorEditor.appendChild(rmBtn);
  }
}

function drawPreview(){
  var c=previewCvs.getContext('2d');
  c.clearRect(0,0,240,50);
  var segs=12;
  for(var i=segs-1;i>=0;i--){
    var x=200-i*15,y=25+Math.sin(i*0.6)*6;
    var t=1-i/segs;
    c.beginPath();c.arc(x,y,5+t*5,0,Math.PI*2);
    c.fillStyle=myColors[i%myColors.length];
    c.globalAlpha=0.4+0.6*t;c.fill();
  }
  c.globalAlpha=1;
  // Head
  c.beginPath();c.arc(200,25,10,0,Math.PI*2);c.fillStyle=myColors[0];c.fill();
  // Eye
  c.beginPath();c.arc(204,22,3,0,Math.PI*2);c.fillStyle='#fff';c.fill();
  c.beginPath();c.arc(205,22,1.5,0,Math.PI*2);c.fillStyle='#111';c.fill();
}
buildColorEditor();drawPreview();

// ── Socket ──
var socket=io({transports:['websocket']});
var myId=null,mouseX=W/2,mouseY=H/2,boosting=false,playing=false,lastScore=0;
var serverState=null;
var leaderboard=[];
// Smooth display positions per player {id: [{x,y},...]}
var displayBuf={};

var PW_NAMES={speed:'Velocidad!',shield:'Escudo!',magnet:'Iman!',x2:'Puntos x2!',shrink:'Encogiste a todos!',ghost:'Fantasma!'};
var PW_COLORS={speed:'#FBBF24',shield:'#3B82F6',magnet:'#A78BFA',x2:'#22C55E',shrink:'#EF4444',ghost:'#94A3B8'};
function showToast(type){
  var el=document.getElementById('pwToast');
  el.textContent=PW_NAMES[type]||type;el.style.color=PW_COLORS[type]||'#fff';
  el.classList.add('show');setTimeout(function(){el.classList.remove('show');},1500);
}
function renderRanking(el,data){
  if(!data||!data.length){el.innerHTML='';return;}
  var h='<h4>Ranking Global</h4>';
  for(var i=0;i<data.length;i++) h+='<div class="ranking-entry"><span class="ranking-name">'+(i+1)+'. '+data[i].n+'</span><span>'+data[i].s+'</span></div>';
  el.innerHTML=h;
}

var menu=document.getElementById('menu'),deathScreen=document.getElementById('deathScreen');
var nameInput=document.getElementById('nameInput'),boostBtn=document.getElementById('boostBtn');
var joystickArea=document.getElementById('joystickArea'),joystickThumb=document.getElementById('joystickThumb');
if(isTouch) document.getElementById('controlsHint').innerHTML='Joystick = direcci\u00f3n &middot; &#x1F680; = turbo<br>Recoge orbes de poder';

function showGameUI(){
  menu.classList.add('hidden');deathScreen.classList.remove('show');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('leaderboard').classList.remove('hidden');
  document.getElementById('minimap').classList.remove('hidden');
  document.getElementById('boostBar').classList.remove('hidden');
  if(isTouch){joystickArea.style.display='block';boostBtn.style.display='flex';if(gyroBtn)gyroBtn.style.display='flex';}
  playing=true;
}
function hideGameUI(){
  document.getElementById('hud').classList.add('hidden');
  if(isTouch){joystickArea.style.display='none';boostBtn.style.display='none';if(gyroBtn)gyroBtn.style.display='none';}
}

function startGame(){
  serverState=null;displayBuf={};
  socket.emit('join',{name:nameInput.value.trim()||'Gusano',skin:myColors.join(',')});
  showGameUI();
}
document.getElementById('playBtn').onclick=startGame;
document.getElementById('playBtn2').onclick=function(){
  serverState=null;displayBuf={};
  socket.emit('respawn',{name:nameInput.value.trim()||'Gusano',skin:myColors.join(',')});
  showGameUI();
};
nameInput.onkeydown=function(e){if(e.key==='Enter')startGame();};

// Desktop input
canvas.onmousemove=function(e){if(!isTouch){mouseX=e.clientX;mouseY=e.clientY;}};
window.addEventListener('mousedown',function(){if(!isTouch)boosting=true;});
window.addEventListener('mouseup',function(){if(!isTouch)boosting=false;});
window.addEventListener('keydown',function(e){if(e.code==='Space'){boosting=true;e.preventDefault();}});
window.addEventListener('keyup',function(e){if(e.code==='Space')boosting=false;});

// Mobile joystick
var joyTouchId=null,joyAngle=0;
function joyMove(cx,cy){
  var r=joystickArea.getBoundingClientRect();
  var dx=cx-r.left-r.width/2,dy=cy-r.top-r.height/2;
  var d=Math.sqrt(dx*dx+dy*dy);
  if(d>32){dx=dx/d*32;dy=dy/d*32;}
  joystickThumb.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
  if(d>8) joyAngle=Math.atan2(dy,dx);
}
function joyReset(){joystickThumb.style.transform='translate(-50%,-50%)';joyTouchId=null;}
joystickArea.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];joyTouchId=t.identifier;joyMove(t.clientX,t.clientY);},{passive:false});
joystickArea.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===joyTouchId){joyMove(e.changedTouches[i].clientX,e.changedTouches[i].clientY);break;}}},{passive:false});
joystickArea.addEventListener('touchend',function(e){for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===joyTouchId){joyReset();break;}}});
joystickArea.addEventListener('touchcancel',joyReset);
canvas.addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});

// ── Gyroscope control ──
var useGyro=false;
var gyroAngle=0;
var hasGyro=false;

function enableGyro(){
  // iOS 13+ requires permission
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(response){
      if(response==='granted'){hasGyro=true;useGyro=true;updateGyroUI();}
    }).catch(function(){});
  } else {
    hasGyro=true;useGyro=true;updateGyroUI();
  }
}

window.addEventListener('deviceorientation',function(e){
  if(!useGyro||!playing)return;
  // beta = front-back tilt (-180 to 180), gamma = left-right tilt (-90 to 90)
  var gamma=e.gamma||0; // left-right
  var beta=e.beta||0;   // front-back
  // Offset so holding phone ~45deg forward is neutral
  beta=beta-40;
  // Clamp
  gamma=Math.max(-45,Math.min(45,gamma));
  beta=Math.max(-45,Math.min(45,beta));
  // Convert to angle (gamma=X, beta=Y)
  gyroAngle=Math.atan2(beta,gamma);
});

// Toggle button
var gyroBtn=null;
function updateGyroUI(){
  if(!gyroBtn)return;
  if(useGyro){
    gyroBtn.style.background='rgba(110,231,183,.3)';gyroBtn.style.borderColor='rgba(110,231,183,.6)';
    joystickArea.style.opacity='0.3';
  } else {
    gyroBtn.style.background='rgba(255,255,255,.05)';gyroBtn.style.borderColor='rgba(255,255,255,.15)';
    joystickArea.style.opacity='1';
  }
}
if(isTouch){
  gyroBtn=document.createElement('button');
  gyroBtn.textContent='🔄';
  gyroBtn.title='Giroscopio';
  gyroBtn.style.cssText='position:fixed;bottom:90px;right:12px;z-index:61;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.15);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent';
  gyroBtn.onclick=function(){
    if(!hasGyro){enableGyro();return;}
    useGyro=!useGyro;updateGyroUI();
  };
  document.body.appendChild(gyroBtn);
}

// Boost
var bTouchId=null;
boostBtn.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();bTouchId=e.changedTouches[0].identifier;boosting=true;boostBtn.classList.add('active');},{passive:false});
boostBtn.addEventListener('touchend',function(e){for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===bTouchId){boosting=false;boostBtn.classList.remove('active');bTouchId=null;break;}}});
boostBtn.addEventListener('touchcancel',function(){boosting=false;boostBtn.classList.remove('active');bTouchId=null;});

// Send input
setInterval(function(){
  if(!playing)return;
  var a;
  if(isTouch){
    a=useGyro?gyroAngle:joyAngle;
  } else {
    a=Math.atan2(mouseY-H/2,mouseX-W/2);
  }
  socket.emit('input',{angle:a,boost:boosting});
},33);

// ── Network - double buffer for smooth interpolation ──
socket.on('ranking',function(d){renderRanking(document.getElementById('menuRanking'),d);});
socket.on('powerup',function(d){showToast(d.type);});

socket.on('s',function(s){
  myId=s.i;
  var up={players:{},food:s.f,powerups:s.pw||[],score:s.sc};
  for(var id in s.p){
    var sp=s.p[id];
    up.players[id]={name:sp.n,skin:sp.sk||'classic',segments:sp.s,boosting:!!sp.b,effects:sp.fx||[]};
  }
  serverState=up;
  leaderboard=(s.lb||[]).map(function(e){return{name:e.n,score:e.s};});
  lastScore=s.sc;
});

socket.on('dead',function(d){
  playing=false;serverState=null;displayBuf={};
  document.getElementById('deathMsg').textContent=d.killer?('Te elimino: '+d.killer):'Tocaste el borde!';
  document.getElementById('deathScore').textContent=d.score||lastScore;
  if(d.ranking){renderRanking(document.getElementById('deathRanking'),d.ranking);renderRanking(document.getElementById('menuRanking'),d.ranking);}
  deathScreen.classList.add('show');hideGameUI();
});

// ── Smooth display: exponential smoothing per frame ──
var SMOOTH=0.18; // blend factor per frame at 60fps

function getSmoothedSegs(id,targetSegs){
  if(!targetSegs||!targetSegs.length)return targetSegs;
  var buf=displayBuf[id];
  if(!buf){
    // First time: snap to position
    buf=[];
    for(var i=0;i<targetSegs.length;i++) buf.push({x:targetSegs[i].x,y:targetSegs[i].y});
    displayBuf[id]=buf;
    return buf;
  }
  // Adjust length
  while(buf.length<targetSegs.length){var l=buf[buf.length-1];buf.push({x:l.x,y:l.y});}
  while(buf.length>targetSegs.length)buf.pop();
  // Smooth each segment toward target
  for(var j=0;j<targetSegs.length;j++){
    buf[j].x+=(targetSegs[j].x-buf[j].x)*SMOOTH;
    buf[j].y+=(targetSegs[j].y-buf[j].y)*SMOOTH;
  }
  return buf;
}

function parseSkinColors(sk){
  if(!sk||sk==='classic')return['#4ECDC4'];
  var parts=sk.split(',');
  var valid=[];
  for(var i=0;i<parts.length;i++){if(parts[i].length>=4)valid.push(parts[i]);}
  return valid.length?valid:['#4ECDC4'];
}

// ── Drawing ──
function drawGrid(cx,cy){
  var gs=65;ctx.strokeStyle='rgba(255,255,255,.02)';ctx.lineWidth=1;
  var sx=-((cx-W/2)%gs+gs)%gs,sy=-((cy-H/2)%gs+gs)%gs;
  ctx.beginPath();
  for(var x=sx;x<W;x+=gs){ctx.moveTo(x,0);ctx.lineTo(x,H);}
  for(var y=sy;y<H;y+=gs){ctx.moveTo(0,y);ctx.lineTo(W,y);}
  ctx.stroke();
}

function drawSnake(segs,skinId,name,isBoosting,effects,cx,cy){
  if(!segs||segs.length<2)return;
  var len=segs.length,colors=parseSkinColors(skinId);
  var sc=Math.min(len/15,4),bw=8+sc*3,hr=bw/2;
  var isGhost=effects&&effects.indexOf('ghost')!==-1;
  var isShielded=effects&&effects.indexOf('shield')!==-1;
  ctx.lineCap='round';ctx.lineJoin='round';

  // Draw body as continuous path per color band
  var bands=Math.min(4,Math.max(2,len));var bs=Math.ceil(len/bands);
  for(var b=bands-1;b>=0;b--){
    var st=Math.max(1,b*bs),en=Math.min(len-1,(b+1)*bs);
    if(st>=en)continue;
    var t=1-(b*bs)/len;
    ctx.beginPath();ctx.moveTo(segs[st].x-cx+W/2,segs[st].y-cy+H/2);
    for(var i=st;i<en;i++)ctx.lineTo(segs[i].x-cx+W/2,segs[i].y-cy+H/2);
    ctx.strokeStyle=colors[b%colors.length];ctx.globalAlpha=isGhost?0.25:(0.4+0.6*t);
    ctx.lineWidth=bw*(0.6+0.4*t);ctx.stroke();
  }
  ctx.beginPath();ctx.moveTo(segs[1].x-cx+W/2,segs[1].y-cy+H/2);ctx.lineTo(segs[0].x-cx+W/2,segs[0].y-cy+H/2);
  ctx.strokeStyle=colors[0];ctx.globalAlpha=isGhost?0.3:1;ctx.lineWidth=bw;ctx.stroke();ctx.globalAlpha=1;

  var hd=segs[0],nx=segs[1],ang=Math.atan2(hd.y-nx.y,hd.x-nx.x);
  var hx=hd.x-cx+W/2,hy=hd.y-cy+H/2;
  if(isShielded){ctx.beginPath();ctx.arc(hx,hy,hr+8,0,Math.PI*2);ctx.strokeStyle='rgba(59,130,246,.4)';ctx.lineWidth=2;ctx.stroke();}
  ctx.globalAlpha=isGhost?0.35:1;ctx.beginPath();ctx.arc(hx,hy,hr,0,Math.PI*2);ctx.fillStyle=colors[0];ctx.fill();
  var eo=hr*0.5,er=Math.max(1.5,hr*0.32),pr=Math.max(0.8,hr*0.18);
  var sides=[-1,1];
  for(var si=0;si<2;si++){var s=sides[si];var ex=hx+Math.cos(ang+Math.PI/2*s)*eo,ey=hy+Math.sin(ang+Math.PI/2*s)*eo;
    ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(ex+Math.cos(ang),ey+Math.sin(ang),pr,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();}
  ctx.globalAlpha=1;ctx.font="600 11px 'Outfit',sans-serif";ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillText(name,hx,hy-hr-9);
  if(isBoosting&&len>2){var tl=segs[len-1],tx=tl.x-cx+W/2,ty=tl.y-cy+H/2;
    for(var pi=0;pi<3;pi++){ctx.beginPath();ctx.arc(tx+(Math.random()-0.5)*20,ty+(Math.random()-0.5)*20,1+Math.random()*2.5,0,Math.PI*2);
      ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];ctx.globalAlpha=0.2+Math.random()*0.3;ctx.fill();}ctx.globalAlpha=1;}
}

function drawFood(fl,cx,cy){
  ctx.globalAlpha=0.7;for(var i=0;i<fl.length;i++){var f=fl[i],fx=f.x-cx+W/2,fy=f.y-cy+H/2;
    if(fx<-15||fx>W+15||fy<-15||fy>H+15)continue;ctx.beginPath();ctx.arc(fx,fy,f.r,0,Math.PI*2);ctx.fillStyle=f.c;ctx.fill();}ctx.globalAlpha=1;
}

function drawPowerups(pwl,cx,cy){
  var now=Date.now();for(var i=0;i<pwl.length;i++){var pw=pwl[i],px=pw.x-cx+W/2,py=pw.y-cy+H/2;
    if(px<-20||px>W+20||py<-20||py>H+20)continue;
    var r=pw.r*(1+Math.sin(now*0.005)*0.15);
    ctx.beginPath();ctx.arc(px,py,r+6,0,Math.PI*2);ctx.fillStyle=pw.c;ctx.globalAlpha=0.12;ctx.fill();
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=pw.c;ctx.globalAlpha=0.85;ctx.fill();
    ctx.globalAlpha=1;ctx.font="14px serif";ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pw.ic,px,py+1);ctx.textBaseline='alphabetic';}ctx.globalAlpha=1;
}

function drawBorder(cx,cy){
  var bx=-cx+W/2,by=-cy+H/2;ctx.strokeStyle='rgba(239,68,68,.45)';ctx.lineWidth=3;ctx.strokeRect(bx,by,WORLD.w,WORLD.h);
  ctx.fillStyle='rgba(239,68,68,.035)';ctx.fillRect(bx-2000,by-2000,WORLD.w+4000,2000);ctx.fillRect(bx-2000,by+WORLD.h,WORLD.w+4000,2000);
  ctx.fillRect(bx-2000,by,2000,WORLD.h);ctx.fillRect(bx+WORLD.w,by,2000,WORLD.h);
}

function drawMinimap(st){
  if(!st)return;var mw=mmCvs.width,mh=mmCvs.height;mmCtx.clearRect(0,0,mw,mh);
  mmCtx.strokeStyle='rgba(239,68,68,.25)';mmCtx.lineWidth=1;mmCtx.strokeRect(1,1,mw-2,mh-2);
  for(var id in st.players){var p=st.players[id],h=p.segments[0];mmCtx.beginPath();mmCtx.arc((h.x/WORLD.w)*mw,(h.y/WORLD.h)*mh,id===myId?3.5:2,0,Math.PI*2);
    mmCtx.fillStyle=id===myId?'#6EE7B7':parseSkinColors(p.skin)[0];mmCtx.fill();}
  mmCtx.globalAlpha=0.6;var pws=st.powerups||[];for(var j=0;j<pws.length;j++){mmCtx.beginPath();mmCtx.arc((pws[j].x/WORLD.w)*mw,(pws[j].y/WORLD.h)*mh,2,0,Math.PI*2);mmCtx.fillStyle=pws[j].c;mmCtx.fill();}mmCtx.globalAlpha=1;
}

var FX_LABELS={speed:['Velocidad','#FBBF24'],shield:['Escudo','#3B82F6'],magnet:['Iman','#A78BFA'],x2:['x2','#22C55E'],ghost:['Fantasma','#94A3B8']};
var lastFxHTML='';
function updateFx(effects){
  if(!effects||!effects.length){if(lastFxHTML!==''){document.getElementById('effectsBar').innerHTML='';lastFxHTML='';}return;}
  var h='';for(var i=0;i<effects.length;i++){var l=FX_LABELS[effects[i]];if(l)h+='<span class="effect-badge" style="background:'+l[1]+'">'+l[0]+'</span>';}
  if(h!==lastFxHTML){document.getElementById('effectsBar').innerHTML=h;lastFxHTML=h;}
}

var lbFrame=0;

function render(){
  requestAnimationFrame(render);
  ctx.fillStyle='#080816';ctx.fillRect(0,0,W,H);
  if(!serverState||!playing)return;

  var me=serverState.players[myId];
  if(!me||!me.segments||!me.segments.length)return;

  // Smooth all players every frame
  var mySegs=getSmoothedSegs(myId,me.segments);
  var cx=mySegs[0].x,cy=mySegs[0].y;

  drawGrid(cx,cy);drawBorder(cx,cy);
  drawFood(serverState.food,cx,cy);drawPowerups(serverState.powerups||[],cx,cy);

  for(var id in serverState.players){
    if(id===myId)continue;
    var p=serverState.players[id];
    var segs=getSmoothedSegs(id,p.segments);
    drawSnake(segs,p.skin,p.name,p.boosting,p.effects,cx,cy);
  }
  drawSnake(mySegs,me.skin,me.name,me.boosting,me.effects,cx,cy);

  if(!isTouch){ctx.beginPath();ctx.arc(mouseX,mouseY,3.5,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1.5;ctx.stroke();}

  document.getElementById('score').textContent='Largo: '+lastScore;
  var bp=Math.max(0,(lastScore-5)/(lastScore||1))*100;
  document.getElementById('boostFill').style.width=(boosting?Math.max(0,bp-20):bp)+'%';
  updateFx(me.effects);

  if(++lbFrame%6===0){var lbh='';for(var li=0;li<leaderboard.length;li++){var e=leaderboard[li];var u=me&&e.name===me.name;
    lbh+='<div class="lb-entry'+(u?' you':'')+'"><span class="lb-name">'+(li+1)+'. '+e.name+'</span><span>'+e.score+'</span></div>';}
    document.getElementById('lbList').innerHTML=lbh;}

  drawMinimap(serverState);
}
render();
})();
</script>
