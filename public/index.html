<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>El Gusanito de Romano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080816; overflow: hidden; font-family: 'Outfit', 'Space Grotesk', sans-serif;
      color: white; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }
    canvas#game { display: block; }

    #menu {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      z-index: 100; background: radial-gradient(ellipse at center, rgba(20,20,50,0.95), rgba(8,8,22,0.98));
      backdrop-filter: blur(12px); overflow-y: auto;
    }
    #menu.hidden { display: none; }
    .menu-box {
      text-align: center; padding: 36px 40px; border-radius: 24px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); max-width: 92vw; margin: 20px 0;
    }
    .menu-box h1 {
      font-family: 'Space Grotesk', sans-serif; font-size: clamp(26px, 6vw, 44px); font-weight: 800;
      margin-bottom: 4px; background: linear-gradient(135deg, #6EE7B7, #3B82F6, #A78BFA);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px;
    }
    .menu-box .subtitle { color: rgba(255,255,255,0.35); margin-bottom: 20px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    #nameInput {
      display: block; width: 260px; max-width: 80vw; margin: 0 auto 14px; padding: 12px 18px;
      font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600;
      border: 2px solid rgba(255,255,255,0.1); border-radius: 14px;
      background: rgba(255,255,255,0.05); color: white; text-align: center; outline: none;
    }
    #nameInput:focus { border-color: rgba(110,231,183,0.5); }
    #nameInput::placeholder { color: rgba(255,255,255,0.2); }

    /* Skin selector */
    .skin-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
    #skinSelector {
      display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; max-width: 280px; margin-left: auto; margin-right: auto;
    }
    .skin-option {
      width: 40px; height: 40px; border-radius: 10px; cursor: pointer; border: 2px solid rgba(255,255,255,0.08);
      transition: border-color 0.2s, transform 0.15s; position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .skin-option:hover { transform: scale(1.1); }
    .skin-option.selected { border-color: #6EE7B7; transform: scale(1.1); }
    .skin-option canvas { width: 100%; height: 100%; }

    .play-btn {
      display: block; width: 260px; max-width: 80vw; margin: 0 auto; padding: 14px;
      font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 1px;
      border: none; border-radius: 14px; background: linear-gradient(135deg, #6EE7B7, #3B82F6);
      color: #080816; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .play-btn:active { transform: scale(0.98); }
    .controls-hint { margin-top: 16px; color: rgba(255,255,255,0.25); font-size: 11px; line-height: 1.9; }

    /* Ranking */
    .ranking-section { margin-top: 18px; text-align: left; }
    .ranking-section h4 {
      font-family: 'Space Grotesk', sans-serif; font-size: 10px; text-transform: uppercase;
      letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-bottom: 6px; text-align: center;
    }
    .ranking-entry {
      display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0;
      color: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .ranking-entry:nth-child(2) { color: #F59E0B; font-weight: 700; }
    .ranking-entry:nth-child(3) { color: #C0C0C0; font-weight: 600; }
    .ranking-entry:nth-child(4) { color: #CD7F32; font-weight: 600; }
    .ranking-name { max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #deathScreen {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      z-index: 90; background: rgba(8,8,22,0.88); backdrop-filter: blur(8px); overflow-y: auto;
    }
    #deathScreen.show { display: flex; }
    .death-box {
      text-align: center; padding: 30px 40px; border-radius: 24px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(239,68,68,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); max-width: 92vw; margin: 20px 0;
    }
    .death-box h2 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 800; color: #EF4444; margin-bottom: 6px; }
    .death-box p { color: rgba(255,255,255,0.45); margin-bottom: 10px; font-size: 14px; }
    #deathScore {
      font-family: 'Space Grotesk', sans-serif; font-size: 48px; font-weight: 800;
      background: linear-gradient(135deg, #6EE7B7, #3B82F6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    #hud { position: fixed; top: 14px; left: 14px; z-index: 50; pointer-events: none; }
    #score { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.85); text-shadow: 0 2px 12px rgba(0,0,0,0.6); }

    #leaderboard {
      position: fixed; top: 14px; right: 14px; z-index: 50; pointer-events: none;
      background: rgba(0,0,0,0.35); border-radius: 14px; padding: 12px 16px; min-width: 155px;
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05);
    }
    #leaderboard h3 { font-family: 'Space Grotesk', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
    .lb-entry { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; color: rgba(255,255,255,0.55); }
    .lb-entry.you { color: #6EE7B7; font-weight: 700; }
    .lb-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Minimap centered bottom */
    #minimap {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 50; pointer-events: none;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.35);
    }

    #boostBar {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 49;
      pointer-events: none; width: 150px; height: 5px; background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
    }
    #boostFill { height: 100%; background: linear-gradient(90deg, #F59E0B, #EF4444); border-radius: 3px; transition: width 0.15s; width: 100%; }

    /* Joystick LEFT */
    #joystickArea {
      display: none; position: fixed; bottom: 18px; left: 14px; z-index: 60;
      width: 100px; height: 100px;
    }
    #joystickBase {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1);
    }
    #joystickThumb {
      position: absolute; width: 36px; height: 36px; border-radius: 50%;
      background: rgba(110,231,183,0.25); border: 1.5px solid rgba(110,231,183,0.4);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }

    /* Boost RIGHT */
    #boostBtn {
      display: none; position: fixed; bottom: 30px; right: 14px; z-index: 61;
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(245,158,11,0.15); border: 2px solid rgba(245,158,11,0.35);
      color: rgba(255,255,255,0.8); font-size: 24px; line-height: 1; cursor: pointer;
      -webkit-tap-highlight-color: transparent; align-items: center; justify-content: center;
    }
    #boostBtn.active { background: rgba(245,158,11,0.45); border-color: rgba(245,158,11,0.7); transform: scale(1.08); }

    @media (max-width: 700px) {
      .menu-box { padding: 28px 22px; }
      #leaderboard { padding: 8px 11px; min-width: 120px; }
      .lb-entry { font-size: 11px; }
      .lb-name { max-width: 68px; }
      #minimap { width: 80px !important; height: 80px !important; bottom: 10px !important; }
      #boostBar { display: none !important; }
      #score { font-size: 16px; }
    }
    @media (hover: hover) and (pointer: fine) { #game { cursor: none; } }
  </style>
</head>
<body>

<div id="menu">
  <div class="menu-box">
    <h1>El Gusanito de Romano</h1>
    <div class="subtitle">multijugador online</div>
    <input type="text" id="nameInput" placeholder="Tu nombre..." maxlength="15" autofocus value="Romano">
    <div class="skin-label">Elegí tu skin</div>
    <div id="skinSelector"></div>
    <button class="play-btn" id="playBtn">JUGAR</button>
    <div class="controls-hint" id="controlsHint">Mouse = dirección &middot; Click / Espacio = turbo</div>
    <div id="menuRanking" class="ranking-section"></div>
  </div>
</div>

<div id="deathScreen">
  <div class="death-box">
    <h2>Moriste</h2>
    <p id="deathMsg"></p>
    <div id="deathScore">0</div>
    <p style="margin-top:4px;font-size:12px;color:rgba(255,255,255,0.25)">de largo</p>
    <div id="deathRanking" class="ranking-section"></div>
    <br>
    <button class="play-btn" id="playBtn2">REINTENTAR</button>
  </div>
</div>

<div id="hud" class="hidden"><div id="score">Largo: 0</div></div>
<div id="leaderboard" class="hidden"><h3>Top Jugadores</h3><div id="lbList"></div></div>
<canvas id="minimap" class="hidden" width="130" height="130"></canvas>
<div id="boostBar" class="hidden"><div id="boostFill"></div></div>

<div id="joystickArea"><div id="joystickBase"></div><div id="joystickThumb"></div></div>
<button id="boostBtn">&#x1F680;</button>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const minimapCanvas = document.getElementById('minimap');
  const minimapCtx = minimapCanvas.getContext('2d');

  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  const WORLD = { w: 2000, h: 2000 };

  // ── Skins definition ──
  const SKINS = [
    { id: 'classic',  name: 'Clásico',    colors: ['#4ECDC4'] },
    { id: 'fire',     name: 'Fuego',      colors: ['#FF6B6B', '#FF8E53', '#FED330'] },
    { id: 'ocean',    name: 'Océano',     colors: ['#0652DD', '#1289A7', '#6EE7B7'] },
    { id: 'purple',   name: 'Galaxia',    colors: ['#A78BFA', '#7C3AED', '#EC4899'] },
    { id: 'neon',     name: 'Neón',       colors: ['#00FF87', '#60EFFF'] },
    { id: 'gold',     name: 'Oro',        colors: ['#F59E0B', '#FBBF24', '#FDE68A'] },
    { id: 'candy',    name: 'Caramelo',   colors: ['#EC4899', '#F472B6', '#FBBF24'] },
    { id: 'ice',      name: 'Hielo',      colors: ['#BAE6FD', '#7DD3FC', '#DBEAFE'] },
    { id: 'toxic',    name: 'Tóxico',     colors: ['#22C55E', '#BEF264', '#4ADE80'] },
    { id: 'blood',    name: 'Sangre',     colors: ['#DC2626', '#7F1D1D', '#EF4444'] },
    { id: 'rainbow',  name: 'Arcoíris',   colors: ['#EF4444','#F59E0B','#22C55E','#3B82F6','#8B5CF6','#EC4899'] },
    { id: 'ghost',    name: 'Fantasma',   colors: ['#94A3B8', '#CBD5E1', '#64748B'] },
  ];

  let selectedSkin = 'classic';

  // Build skin selector
  const skinSelector = document.getElementById('skinSelector');
  SKINS.forEach(skin => {
    const div = document.createElement('div');
    div.className = 'skin-option' + (skin.id === selectedSkin ? ' selected' : '');
    div.title = skin.name;
    const c = document.createElement('canvas');
    c.width = 40; c.height = 40;
    const sctx = c.getContext('2d');
    // Draw mini snake preview
    const cols = skin.colors;
    for (let i = 0; i < 5; i++) {
      const x = 8 + i * 5;
      const y = 20 + Math.sin(i * 0.8) * 4;
      sctx.beginPath();
      sctx.arc(x, y, 5, 0, Math.PI * 2);
      sctx.fillStyle = cols[i % cols.length];
      sctx.globalAlpha = 0.5 + 0.5 * (1 - i / 5);
      sctx.fill();
    }
    sctx.globalAlpha = 1;
    // Head
    sctx.beginPath(); sctx.arc(8, 20, 5.5, 0, Math.PI*2); sctx.fillStyle = cols[0]; sctx.fill();
    // Eye
    sctx.beginPath(); sctx.arc(9, 18.5, 1.5, 0, Math.PI*2); sctx.fillStyle = '#fff'; sctx.fill();
    sctx.beginPath(); sctx.arc(9.5, 18.5, 0.8, 0, Math.PI*2); sctx.fillStyle = '#111'; sctx.fill();

    div.appendChild(c);
    div.addEventListener('click', () => {
      skinSelector.querySelectorAll('.skin-option').forEach(s => s.classList.remove('selected'));
      div.classList.add('selected');
      selectedSkin = skin.id;
    });
    skinSelector.appendChild(div);
  });

  function getSkinColors(skinId) {
    const s = SKINS.find(sk => sk.id === skinId);
    return s ? s.colors : ['#4ECDC4'];
  }

  const socket = io({ transports: ['websocket'] });
  let myId = null;
  let mouseX = W / 2;
  let mouseY = H / 2;
  let boosting = false;
  let playing = false;
  let lastScore = 0;

  let prevState = null;
  let currState = null;
  let stateTime = 0;
  let leaderboard = [];
  let globalRanking = [];

  // ── Ranking rendering ──
  function renderRanking(container, data) {
    if (!data || data.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = '<h4>Ranking Global</h4>' + data.map((e, i) =>
      `<div class="ranking-entry"><span class="ranking-name">${i+1}. ${e.n}</span><span>${e.s}</span></div>`
    ).join('');
  }

  const menu = document.getElementById('menu');
  const deathScreen = document.getElementById('deathScreen');
  const nameInput = document.getElementById('nameInput');
  const boostBtn = document.getElementById('boostBtn');
  const joystickArea = document.getElementById('joystickArea');
  const joystickThumb = document.getElementById('joystickThumb');

  if (isTouchDevice) {
    document.getElementById('controlsHint').innerHTML = 'Joystick = dirección &middot; &#x1F680; = turbo';
  }

  function showGameUI() {
    menu.classList.add('hidden');
    deathScreen.classList.remove('show');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('leaderboard').classList.remove('hidden');
    document.getElementById('minimap').classList.remove('hidden');
    document.getElementById('boostBar').classList.remove('hidden');
    if (isTouchDevice) { joystickArea.style.display = 'block'; boostBtn.style.display = 'flex'; }
    playing = true;
  }

  function hideGameUI() {
    document.getElementById('hud').classList.add('hidden');
    if (isTouchDevice) { joystickArea.style.display = 'none'; boostBtn.style.display = 'none'; }
  }

  function startGame() {
    socket.emit('join', { name: nameInput.value.trim() || 'Gusano', skin: selectedSkin });
    showGameUI();
  }

  document.getElementById('playBtn').onclick = startGame;
  document.getElementById('playBtn2').onclick = () => {
    socket.emit('respawn', { name: nameInput.value.trim() || 'Gusano', skin: selectedSkin });
    showGameUI();
  };
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startGame(); });

  // === Desktop input ===
  canvas.addEventListener('mousemove', (e) => { if (!isTouchDevice) { mouseX = e.clientX; mouseY = e.clientY; } });
  window.addEventListener('mousedown', () => { if (!isTouchDevice) boosting = true; });
  window.addEventListener('mouseup', () => { if (!isTouchDevice) boosting = false; });
  window.addEventListener('keydown', (e) => { if (e.code === 'Space') { boosting = true; e.preventDefault(); } });
  window.addEventListener('keyup', (e) => { if (e.code === 'Space') boosting = false; });

  // === Mobile joystick (LEFT) ===
  let joystickTouchId = null;
  let joystickAngle = null;
  const THUMB_MAX = 32;

  function handleJoystickMove(cx, cy) {
    const rect = joystickArea.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    let dx = cx - centerX, dy = cy - centerY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > THUMB_MAX) { dx = (dx/dist)*THUMB_MAX; dy = (dy/dist)*THUMB_MAX; }
    joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    if (dist > 8) joystickAngle = Math.atan2(dy, dx);
  }
  function resetJoystick() { joystickThumb.style.transform = 'translate(-50%, -50%)'; joystickTouchId = null; }

  joystickArea.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.changedTouches[0]; joystickTouchId = t.identifier; handleJoystickMove(t.clientX, t.clientY); }, { passive: false });
  joystickArea.addEventListener('touchmove', (e) => { e.preventDefault(); for (const t of e.changedTouches) { if (t.identifier === joystickTouchId) { handleJoystickMove(t.clientX, t.clientY); break; } } }, { passive: false });
  joystickArea.addEventListener('touchend', (e) => { for (const t of e.changedTouches) { if (t.identifier === joystickTouchId) { resetJoystick(); break; } } });
  joystickArea.addEventListener('touchcancel', resetJoystick);

  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

  // Boost (RIGHT)
  let boostTouchId = null;
  boostBtn.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); boostTouchId = e.changedTouches[0].identifier; boosting = true; boostBtn.classList.add('active'); }, { passive: false });
  boostBtn.addEventListener('touchend', (e) => { for (const t of e.changedTouches) { if (t.identifier === boostTouchId) { boosting = false; boostBtn.classList.remove('active'); boostTouchId = null; break; } } });
  boostBtn.addEventListener('touchcancel', () => { boosting = false; boostBtn.classList.remove('active'); boostTouchId = null; });

  // Send input
  setInterval(() => {
    if (!playing) return;
    const angle = isTouchDevice ? joystickAngle : Math.atan2(mouseY - H/2, mouseX - W/2);
    if (angle !== null) socket.emit('input', { angle, boost: boosting });
  }, 50);

  // ── Network ──
  socket.on('ranking', (data) => {
    globalRanking = data;
    renderRanking(document.getElementById('menuRanking'), data);
  });

  socket.on('s', (s) => {
    myId = s.i;
    prevState = currState;
    const unpacked = { players: {}, food: s.f, score: s.sc };
    for (const id in s.p) {
      const sp = s.p[id];
      unpacked.players[id] = { name: sp.n, color: sp.c, skin: sp.sk || 'classic', segments: sp.s, boosting: !!sp.b };
    }
    currState = unpacked;
    stateTime = Date.now();
    leaderboard = (s.lb || []).map(e => ({ name: e.n, score: e.s }));
    lastScore = s.sc;
  });

  socket.on('dead', (data) => {
    playing = false;
    const finalScore = data.score || lastScore;
    document.getElementById('deathMsg').textContent = data.killer ? `Te eliminó: ${data.killer}` : 'Tocaste el borde!';
    document.getElementById('deathScore').textContent = finalScore;
    if (data.ranking) {
      globalRanking = data.ranking;
      renderRanking(document.getElementById('deathRanking'), data.ranking);
      renderRanking(document.getElementById('menuRanking'), data.ranking);
    }
    deathScreen.classList.add('show');
    hideGameUI();
  });

  // ── Interpolation ──
  function lerpSegs(prevSegs, currSegs, t) {
    if (!prevSegs) return currSegs;
    const len = Math.min(prevSegs.length, currSegs.length);
    const out = [];
    for (let i = 0; i < len; i++) out.push({ x: prevSegs[i].x + (currSegs[i].x - prevSegs[i].x) * t, y: prevSegs[i].y + (currSegs[i].y - prevSegs[i].y) * t });
    for (let i = len; i < currSegs.length; i++) out.push(currSegs[i]);
    return out;
  }

  // ── Drawing ──
  function drawGrid(camX, camY) {
    const gs = 65;
    ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 1;
    const sx = -((camX - W/2) % gs + gs) % gs;
    const sy = -((camY - H/2) % gs + gs) % gs;
    ctx.beginPath();
    for (let x = sx; x < W; x += gs) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = sy; y < H; y += gs) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();
  }

  function drawSnake(segs, baseColor, skinId, name, isBoosting, isMe, camX, camY) {
    if (segs.length < 2) return;
    const len = segs.length;
    const colors = getSkinColors(skinId);

    // Thickness scales with length — body and head same width
    const sizeScale = Math.min(len / 15, 4);
    const bodyThick = 8 + sizeScale * 3; // 11 to 20

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Draw body in bands with skin colors
    const bands = 4;
    const bandSize = Math.ceil(len / bands);

    for (let b = bands - 1; b >= 0; b--) {
      const start = Math.max(1, b * bandSize);
      const end = Math.min(len - 1, (b + 1) * bandSize);
      if (start >= end) continue;

      const t = 1 - (b * bandSize) / len;
      const col = colors[b % colors.length];

      ctx.beginPath();
      ctx.moveTo(segs[start].x - camX + W/2, segs[start].y - camY + H/2);
      for (let i = start; i < end; i++) {
        ctx.lineTo(segs[i].x - camX + W/2, segs[i].y - camY + H/2);
      }
      ctx.strokeStyle = col;
      ctx.globalAlpha = 0.4 + 0.6 * t;
      ctx.lineWidth = bodyThick * (0.6 + 0.4 * t);
      ctx.stroke();
    }

    // Connect to head (same thickness as body)
    ctx.beginPath();
    ctx.moveTo(segs[1].x - camX + W/2, segs[1].y - camY + H/2);
    ctx.lineTo(segs[0].x - camX + W/2, segs[0].y - camY + H/2);
    ctx.strokeStyle = colors[0];
    ctx.globalAlpha = 1;
    ctx.lineWidth = bodyThick;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Head circle — same radius as body thickness
    const head = segs[0], next = segs[1];
    const angle = Math.atan2(head.y - next.y, head.x - next.x);
    const hx = head.x - camX + W/2, hy = head.y - camY + H/2;
    const headR = bodyThick / 2;

    ctx.beginPath(); ctx.arc(hx, hy, headR, 0, Math.PI*2);
    ctx.fillStyle = colors[0]; ctx.fill();

    // Eyes proportional
    const eyeOff = headR * 0.5;
    const eyeR = Math.max(2, headR * 0.32);
    const pupilR = Math.max(1, headR * 0.18);
    for (const side of [-1, 1]) {
      const ex = hx + Math.cos(angle + (Math.PI/2)*side) * eyeOff;
      const ey = hy + Math.sin(angle + (Math.PI/2)*side) * eyeOff;
      ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
      ctx.beginPath(); ctx.arc(ex + Math.cos(angle)*1, ey + Math.sin(angle)*1, pupilR, 0, Math.PI*2); ctx.fillStyle = '#111'; ctx.fill();
    }

    // Name
    ctx.font = "600 12px 'Outfit', sans-serif"; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(name, hx, hy - headR - 10);

    // Boost particles
    if (isBoosting && len > 2) {
      const tail = segs[len-1];
      const tx = tail.x - camX + W/2, ty = tail.y - camY + H/2;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(tx + (Math.random()-0.5)*24, ty + (Math.random()-0.5)*24, 1.5+Math.random()*3, 0, Math.PI*2);
        ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
        ctx.globalAlpha = 0.25 + Math.random()*0.35; ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  function drawFood(foodList, camX, camY) {
    ctx.globalAlpha = 0.75;
    for (const f of foodList) {
      const fx = f.x - camX + W/2, fy = f.y - camY + H/2;
      if (fx < -20 || fx > W+20 || fy < -20 || fy > H+20) continue;
      ctx.beginPath(); ctx.arc(fx, fy, f.r, 0, Math.PI*2); ctx.fillStyle = f.c; ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawBorder(camX, camY) {
    const bx = -camX + W/2, by = -camY + H/2;
    ctx.strokeStyle = 'rgba(239,68,68,0.5)'; ctx.lineWidth = 3;
    ctx.strokeRect(bx, by, WORLD.w, WORLD.h);
    ctx.fillStyle = 'rgba(239,68,68,0.04)';
    ctx.fillRect(bx-2000, by-2000, WORLD.w+4000, 2000);
    ctx.fillRect(bx-2000, by+WORLD.h, WORLD.w+4000, 2000);
    ctx.fillRect(bx-2000, by, 2000, WORLD.h);
    ctx.fillRect(bx+WORLD.w, by, 2000, WORLD.h);
  }

  function drawMinimap() {
    if (!currState) return;
    const mw = minimapCanvas.width, mh = minimapCanvas.height;
    minimapCtx.clearRect(0, 0, mw, mh);
    minimapCtx.strokeStyle = 'rgba(239,68,68,0.3)'; minimapCtx.lineWidth = 1;
    minimapCtx.strokeRect(1, 1, mw-2, mh-2);
    for (const id in currState.players) {
      const p = currState.players[id], h = p.segments[0];
      minimapCtx.beginPath();
      minimapCtx.arc((h.x/WORLD.w)*mw, (h.y/WORLD.h)*mh, id === myId ? 4 : 2.5, 0, Math.PI*2);
      minimapCtx.fillStyle = id === myId ? '#6EE7B7' : getSkinColors(p.skin)[0];
      minimapCtx.fill();
    }
  }

  // ── Render ──
  function render() {
    requestAnimationFrame(render);
    ctx.fillStyle = '#080816'; ctx.fillRect(0, 0, W, H);
    if (!currState || !playing) return;

    const netInterval = 50;
    const t = Math.min((Date.now() - stateTime) / netInterval, 1.2);
    const me = currState.players[myId];
    if (!me) return;

    const prevMe = prevState ? prevState.players[myId] : null;
    const mySegs = lerpSegs(prevMe ? prevMe.segments : null, me.segments, t);
    const camX = mySegs[0].x, camY = mySegs[0].y;

    drawGrid(camX, camY);
    drawBorder(camX, camY);
    drawFood(currState.food, camX, camY);

    for (const id in currState.players) {
      if (id === myId) continue;
      const cp = currState.players[id];
      const pp = prevState ? prevState.players[id] : null;
      const segs = lerpSegs(pp ? pp.segments : null, cp.segments, t);
      drawSnake(segs, cp.color, cp.skin, cp.name, cp.boosting, false, camX, camY);
    }
    drawSnake(mySegs, me.color, me.skin, me.name, me.boosting, true, camX, camY);

    if (!isTouchDevice) {
      ctx.beginPath(); ctx.arc(mouseX, mouseY, 4, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();
    }

    document.getElementById('score').textContent = `Largo: ${lastScore}`;
    const bp = Math.max(0, (lastScore-5) / (lastScore||1)) * 100;
    document.getElementById('boostFill').style.width = (boosting ? Math.max(0, bp-20) : bp) + '%';

    if (Math.random() < 0.1) {
      document.getElementById('lbList').innerHTML = leaderboard.map((e, i) => {
        const isYou = me && e.name === me.name;
        return `<div class="lb-entry${isYou ? ' you' : ''}"><span class="lb-name">${i+1}. ${e.name}</span><span>${e.score}</span></div>`;
      }).join('');
    }

    drawMinimap();
  }
  render();
})();
</script>
</body>
</html>
