<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>El Gusanito de Romano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080816;
      overflow: hidden;
      font-family: 'Outfit', 'Space Grotesk', sans-serif;
      color: white;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas#game { display: block; }

    /* ── Menu ── */
    #menu {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: radial-gradient(ellipse at center, rgba(20, 20, 50, 0.95), rgba(8, 8, 22, 0.98));
      backdrop-filter: blur(12px);
    }
    #menu.hidden { display: none; }

    .menu-box {
      text-align: center;
      padding: 44px 48px;
      border-radius: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      max-width: 92vw;
    }
    .menu-box h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(30px, 7vw, 48px);
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #6EE7B7, #3B82F6, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    .menu-box .subtitle {
      color: rgba(255,255,255,0.35);
      margin-bottom: 28px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #nameInput {
      display: block;
      width: 260px;
      max-width: 80vw;
      margin: 0 auto 16px;
      padding: 13px 20px;
      font-family: 'Outfit', sans-serif;
      font-size: 17px;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      color: white;
      text-align: center;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #nameInput:focus {
      border-color: rgba(110, 231, 183, 0.5);
      box-shadow: 0 0 20px rgba(110, 231, 183, 0.1);
    }
    #nameInput::placeholder { color: rgba(255,255,255,0.2); }

    .play-btn {
      display: block;
      width: 260px;
      max-width: 80vw;
      margin: 0 auto;
      padding: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #6EE7B7, #3B82F6);
      color: #080816;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .play-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 30px rgba(110, 231, 183, 0.3);
    }
    .play-btn:active { transform: scale(0.98); }

    .controls-hint {
      margin-top: 22px;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      line-height: 1.9;
      letter-spacing: 0.5px;
    }

    /* ── Death screen ── */
    #deathScreen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 90;
      background: rgba(8, 8, 22, 0.88);
      backdrop-filter: blur(8px);
    }
    #deathScreen.show { display: flex; }
    .death-box {
      text-align: center;
      padding: 36px 44px;
      border-radius: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(239, 68, 68, 0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      max-width: 92vw;
    }
    .death-box h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: #EF4444;
      margin-bottom: 8px;
    }
    .death-box p { color: rgba(255,255,255,0.45); margin-bottom: 14px; font-size: 14px; }
    #deathScore {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 52px;
      font-weight: 800;
      background: linear-gradient(135deg, #6EE7B7, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 50;
      pointer-events: none;
    }
    #score {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    /* ── Leaderboard ── */
    #leaderboard {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 50;
      pointer-events: none;
      background: rgba(0,0,0,0.35);
      border-radius: 14px;
      padding: 12px 16px;
      min-width: 155px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.05);
    }
    #leaderboard h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .lb-entry {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 2px 0;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
    }
    .lb-entry.you { color: #6EE7B7; font-weight: 700; }
    .lb-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Minimap ── */
    #minimap {
      position: fixed;
      bottom: 14px;
      left: 14px;
      z-index: 50;
      pointer-events: none;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.35);
    }

    /* ── Boost bar ── */
    #boostBar {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: none;
      width: 150px;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    #boostFill {
      height: 100%;
      background: linear-gradient(90deg, #F59E0B, #EF4444);
      border-radius: 3px;
      transition: width 0.2s;
      width: 100%;
    }

    /* ── Mobile boost button ── */
    #boostBtn {
      display: none;
      position: fixed;
      bottom: 30px;
      right: 14px;
      z-index: 60;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(245, 158, 11, 0.15);
      border: 2px solid rgba(245, 158, 11, 0.35);
      color: rgba(255,255,255,0.8);
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.15s;
      align-items: center;
      justify-content: center;
    }
    #boostBtn.active {
      background: rgba(245, 158, 11, 0.45);
      border-color: rgba(245, 158, 11, 0.7);
      transform: scale(1.08);
    }

    /* ── Mobile adjustments ── */
    @media (max-width: 700px) {
      .menu-box { padding: 32px 28px; }
      #leaderboard { padding: 8px 11px; min-width: 120px; }
      #leaderboard h3 { font-size: 9px; }
      .lb-entry { font-size: 11px; }
      .lb-name { max-width: 68px; }
      #minimap { width: 90px !important; height: 90px !important; }
      #boostBar { width: 100px; }
      #score { font-size: 16px; }
    }

    @media (hover: hover) and (pointer: fine) {
      #game { cursor: none; }
    }
  </style>
</head>
<body>

<div id="menu">
  <div class="menu-box">
    <h1>El Gusanito de Romano</h1>
    <div class="subtitle">multijugador online</div>
    <input type="text" id="nameInput" placeholder="Tu nombre..." maxlength="15" autofocus value="Romano">
    <button class="play-btn" id="playBtn">JUGAR</button>
    <div class="controls-hint" id="controlsHint">
      Mouse = dirección &nbsp;&middot;&nbsp; Click / Espacio = turbo
    </div>
  </div>
</div>

<div id="deathScreen">
  <div class="death-box">
    <h2>Moriste</h2>
    <p id="deathMsg"></p>
    <div id="deathScore">0</div>
    <p style="margin-top: 4px; font-size: 12px; color: rgba(255,255,255,0.25);">de largo</p>
    <br>
    <button class="play-btn" id="playBtn2">REINTENTAR</button>
  </div>
</div>

<div id="hud" class="hidden">
  <div id="score">Largo: 0</div>
</div>

<div id="leaderboard" class="hidden">
  <h3>Top Jugadores</h3>
  <div id="lbList"></div>
</div>

<canvas id="minimap" class="hidden" width="130" height="130"></canvas>

<div id="boostBar" class="hidden">
  <div id="boostFill"></div>
</div>

<button id="boostBtn">&#x1F680;</button>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const minimapCanvas = document.getElementById('minimap');
  const minimapCtx = minimapCanvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  const socket = io();
  let state = null;
  let myId = null;
  let mouseX = W / 2;
  let mouseY = H / 2;
  let boosting = false;
  let playing = false;
  let lastScore = 0;
  let touchAngle = null;

  const menu = document.getElementById('menu');
  const deathScreen = document.getElementById('deathScreen');
  const nameInput = document.getElementById('nameInput');
  const boostBtn = document.getElementById('boostBtn');

  if (isTouchDevice) {
    document.getElementById('controlsHint').innerHTML =
      'Tocá la pantalla = dirección &nbsp;&middot;&nbsp; Botón &#x1F680; = turbo';
  }

  function showGameUI() {
    menu.classList.add('hidden');
    deathScreen.classList.remove('show');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('leaderboard').classList.remove('hidden');
    document.getElementById('minimap').classList.remove('hidden');
    document.getElementById('boostBar').classList.remove('hidden');
    if (isTouchDevice) {
      boostBtn.style.display = 'flex';
    }
    playing = true;
  }

  function hideGameUI() {
    document.getElementById('hud').classList.add('hidden');
    if (isTouchDevice) {
      boostBtn.style.display = 'none';
    }
  }

  function startGame() {
    const name = nameInput.value.trim() || 'Gusano';
    socket.emit('join', { name });
    showGameUI();
  }

  document.getElementById('playBtn').onclick = startGame;
  document.getElementById('playBtn2').onclick = () => {
    const name = nameInput.value.trim() || 'Gusano';
    socket.emit('respawn', { name });
    showGameUI();
  };
  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') startGame();
  });

  // === DESKTOP INPUT ===
  canvas.addEventListener('mousemove', (e) => {
    if (!isTouchDevice) {
      mouseX = e.clientX;
      mouseY = e.clientY;
    }
  });
  window.addEventListener('mousedown', (e) => {
    if (!isTouchDevice) boosting = true;
  });
  window.addEventListener('mouseup', (e) => {
    if (!isTouchDevice) boosting = false;
  });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { boosting = true; e.preventDefault(); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') boosting = false;
  });

  // === MOBILE: touch anywhere on screen = direction ===
  let moveTouchId = null;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!playing) return;
    const touch = e.changedTouches[0];
    moveTouchId = touch.identifier;
    mouseX = touch.clientX;
    mouseY = touch.clientY;
    touchAngle = Math.atan2(mouseY - H / 2, mouseX - W / 2);
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!playing) return;
    for (const touch of e.changedTouches) {
      if (touch.identifier === moveTouchId) {
        mouseX = touch.clientX;
        mouseY = touch.clientY;
        touchAngle = Math.atan2(mouseY - H / 2, mouseX - W / 2);
        break;
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    for (const touch of e.changedTouches) {
      if (touch.identifier === moveTouchId) {
        moveTouchId = null;
        // Keep last angle, don't reset
        break;
      }
    }
  });

  // === MOBILE: boost button ===
  let boostTouchId = null;

  boostBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    e.stopPropagation();
    boostTouchId = e.changedTouches[0].identifier;
    boosting = true;
    boostBtn.classList.add('active');
  }, { passive: false });

  boostBtn.addEventListener('touchend', (e) => {
    for (const touch of e.changedTouches) {
      if (touch.identifier === boostTouchId) {
        boosting = false;
        boostBtn.classList.remove('active');
        boostTouchId = null;
        break;
      }
    }
  });

  boostBtn.addEventListener('touchcancel', () => {
    boosting = false;
    boostBtn.classList.remove('active');
    boostTouchId = null;
  });

  // Send input
  setInterval(() => {
    if (!playing || !state) return;
    let angle;
    if (isTouchDevice) {
      angle = touchAngle;
    } else {
      angle = Math.atan2(mouseY - H / 2, mouseX - W / 2);
    }
    if (angle !== null) {
      socket.emit('input', { angle, boost: boosting });
    }
  }, 1000 / 30);

  // Receive state
  socket.on('state', (s) => {
    state = s;
    myId = s.you;
  });

  socket.on('dead', (data) => {
    playing = false;
    document.getElementById('deathMsg').textContent =
      data.killer ? `Te eliminó: ${data.killer}` : 'Tocaste el borde!';
    document.getElementById('deathScore').textContent = lastScore;
    deathScreen.classList.add('show');
    hideGameUI();
  });

  // ── Rendering ──

  function drawGrid(camX, camY) {
    const gridSize = 65;
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;

    const startX = -((camX - W / 2) % gridSize);
    const startY = -((camY - H / 2) % gridSize);

    for (let x = startX; x < W; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = startY; y < H; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
  }

  function drawSnake(p, camX, camY, isMe) {
    const segs = p.segments;
    if (segs.length < 2) return;

    ctx.shadowColor = p.color;
    ctx.shadowBlur = isMe ? 20 : 10;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    for (let i = segs.length - 1; i >= 1; i--) {
      const s = segs[i];
      const prev = segs[i - 1];
      const t = 1 - i / segs.length;
      const alpha = 0.4 + 0.6 * t;
      const thickness = 8 + t * 10;

      ctx.beginPath();
      ctx.moveTo(s.x - camX + W / 2, s.y - camY + H / 2);
      ctx.lineTo(prev.x - camX + W / 2, prev.y - camY + H / 2);
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = thickness;
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Head
    const head = segs[0];
    const next = segs[1] || head;
    const angle = Math.atan2(head.y - next.y, head.x - next.x);
    const hx = head.x - camX + W / 2;
    const hy = head.y - camY + H / 2;

    ctx.beginPath();
    ctx.arc(hx, hy, 12, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();

    // Eyes
    for (const side of [-1, 1]) {
      const ex = hx + Math.cos(angle + (Math.PI / 2) * side) * 5;
      const ey = hy + Math.sin(angle + (Math.PI / 2) * side) * 5;
      ctx.beginPath();
      ctx.arc(ex, ey, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + Math.cos(angle) * 1.3, ey + Math.sin(angle) * 1.3, 1.8, 0, Math.PI * 2);
      ctx.fillStyle = '#111';
      ctx.fill();
    }

    // Name
    ctx.font = "600 12px 'Outfit', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(p.name, hx, hy - 22);

    // Boost particles
    if (p.boosting && segs.length > 2) {
      const tail = segs[segs.length - 1];
      const tx = tail.x - camX + W / 2;
      const ty = tail.y - camY + H / 2;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(
          tx + (Math.random() - 0.5) * 24,
          ty + (Math.random() - 0.5) * 24,
          1.5 + Math.random() * 3,
          0, Math.PI * 2
        );
        ctx.fillStyle = p.color;
        ctx.globalAlpha = 0.2 + Math.random() * 0.4;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  function drawFood(foodList, camX, camY) {
    for (const f of foodList) {
      const fx = f.x - camX + W / 2;
      const fy = f.y - camY + H / 2;
      if (fx < -20 || fx > W + 20 || fy < -20 || fy > H + 20) continue;

      ctx.shadowColor = f.color;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(fx, fy, f.r, 0, Math.PI * 2);
      ctx.fillStyle = f.color;
      ctx.globalAlpha = 0.75;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function drawBorder(camX, camY, world) {
    // Danger zone glow near borders
    const bx = -camX + W / 2;
    const by = -camY + H / 2;

    // Red border
    ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
    ctx.lineWidth = 3;
    ctx.setLineDash([]);
    ctx.strokeRect(bx, by, world.w, world.h);

    // Outer dark area
    ctx.fillStyle = 'rgba(239, 68, 68, 0.04)';
    // top
    ctx.fillRect(bx - 2000, by - 2000, world.w + 4000, 2000);
    // bottom
    ctx.fillRect(bx - 2000, by + world.h, world.w + 4000, 2000);
    // left
    ctx.fillRect(bx - 2000, by, 2000, world.h);
    // right
    ctx.fillRect(bx + world.w, by, 2000, world.h);
  }

  function drawMinimap(world) {
    if (!state) return;
    const mw = minimapCanvas.width;
    const mh = minimapCanvas.height;
    minimapCtx.clearRect(0, 0, mw, mh);

    // Border
    minimapCtx.strokeStyle = 'rgba(239, 68, 68, 0.3)';
    minimapCtx.lineWidth = 1;
    minimapCtx.strokeRect(1, 1, mw - 2, mh - 2);

    for (const id in state.players) {
      const p = state.players[id];
      const head = p.segments[0];
      const mx = (head.x / world.w) * mw;
      const my = (head.y / world.h) * mh;
      minimapCtx.beginPath();
      minimapCtx.arc(mx, my, id === myId ? 4 : 2.5, 0, Math.PI * 2);
      minimapCtx.fillStyle = id === myId ? '#6EE7B7' : p.color;
      minimapCtx.fill();
    }
  }

  // Main render loop
  function render() {
    requestAnimationFrame(render);

    ctx.fillStyle = '#080816';
    ctx.fillRect(0, 0, W, H);

    if (!state || !playing) return;

    const me = state.players[myId];
    if (!me) return;

    const head = me.segments[0];
    const camX = head.x;
    const camY = head.y;

    drawGrid(camX, camY);
    drawBorder(camX, camY, state.world);
    drawFood(state.food, camX, camY);

    for (const id in state.players) {
      if (id === myId) continue;
      drawSnake(state.players[id], camX, camY, false);
    }
    drawSnake(me, camX, camY, true);

    // Cursor (desktop only)
    if (!isTouchDevice) {
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // HUD
    lastScore = state.score;
    document.getElementById('score').textContent = `Largo: ${state.score}`;

    const boostPercent = Math.max(0, (state.score - 5) / (state.score || 1)) * 100;
    document.getElementById('boostFill').style.width =
      boosting ? Math.max(0, boostPercent - 20) + '%' : boostPercent + '%';

    // Leaderboard
    const lbList = document.getElementById('lbList');
    lbList.innerHTML = state.leaderboard
      .map((e, i) => {
        const isYou = state.players[myId] && e.name === state.players[myId].name;
        return `<div class="lb-entry${isYou ? ' you' : ''}">
          <span class="lb-name">${i + 1}. ${e.name}</span>
          <span>${e.score}</span>
        </div>`;
      }).join('');

    drawMinimap(state.world);
  }

  render();
})();
</script>
</body>
</html>
